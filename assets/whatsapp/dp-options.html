<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Group DP options — Colaberry AI Training Community</title>
<style>
  body { margin:0; font-family:'Roboto',system-ui,sans-serif; background:#F8F8F7; color:#1A1A1A; padding:48px; }
  .wrap { max-width:980px; margin:0 auto; }
  h1 { font-size:26px; font-weight:900; letter-spacing:-.02em; margin:0 0 6px; }
  p.sub { color:#6B6B6B; margin:0 0 36px; font-size:15px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:32px; }
  .opt { background:#fff; border:1px solid #E4E4E3; border-radius:16px; padding:22px; box-shadow:0 3px 8px rgba(26,26,26,.05); }
  .name { font-family:'Roboto Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#6B6B6B; margin:0 0 16px; }
  .shots { display:flex; align-items:center; gap:18px; }
  .sq { width:120px; height:120px; border-radius:10px; overflow:hidden; flex:none; }
  .ci { width:120px; height:120px; border-radius:50%; overflow:hidden; flex:none; box-shadow:0 0 0 4px #fff,0 0 0 5px #E4E4E3; }
  img { width:100%; height:100%; object-fit:cover; display:block; }
  .tag { font-family:'Roboto Mono',monospace; font-size:10px; color:#B4B4B4; text-align:center; margin-top:8px; }
  .col { display:flex; flex-direction:column; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Group photo options</h1>
    <p class="sub">For the <b>Colaberry AI Training Community</b> WhatsApp group · exported 640 × 640 · left = file, right = how WhatsApp crops it (circle)</p>
    <div class="grid">
      <div class="opt">
        <p class="name">Cherry · primary</p>
        <div class="shots">
          <div class="col"><div class="sq"><img src="dp-community-cherry.png" alt=""></div><div class="tag">file</div></div>
          <div class="col"><div class="ci"><img src="dp-community-cherry.png" alt=""></div><div class="tag">in WhatsApp</div></div>
        </div>
      </div>
      <div class="opt">
        <p class="name">Cherry · wordmark</p>
        <div class="shots">
          <div class="col"><div class="sq"><img src="dp-community-cherry-wordmark.png" alt=""></div><div class="tag">file</div></div>
          <div class="col"><div class="ci"><img src="dp-community-cherry-wordmark.png" alt=""></div><div class="tag">in WhatsApp</div></div>
        </div>
      </div>
      <div class="opt">
        <p class="name">Dark · alt</p>
        <div class="shots">
          <div class="col"><div class="sq"><img src="dp-community-dark.png" alt=""></div><div class="tag">file</div></div>
          <div class="col"><div class="ci"><img src="dp-community-dark.png" alt=""></div><div class="tag">in WhatsApp</div></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
