<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Colaberry Insight</title>
<link rel="icon" href="../assets/logo/export/favicon-32.png">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="auth">
  <aside class="auth__aside">
    <a href="index.html"><img src="../assets/logo/colaberry-horizontal-white.png" alt="Colaberry"></a>
    <div class="quote">
      <h2>Welcome back. Your data is waiting.</h2>
      <p>Pick up where you left off — live dashboards, talent pipelines, and outcome analytics in one workspace.</p>
    </div>
    <div style="position:relative;font-size:13px;color:rgba(255,255,255,.7)">Trusted by data teams since 2012</div>
  </aside>

  <main class="auth__main">
    <div class="auth__card cb-anim-fade-up">
      <h1>Sign in</h1>
      <p class="muted">New to Colaberry Insight? <a href="register.html" style="color:var(--text-link);font-weight:500;text-decoration:none">Create an account</a>.</p>
      <div class="social-row" style="margin-bottom:8px">
        <button class="social-btn" type="button"><span class="cb-i"><i class="ri-google-fill"></i></span>Google</button>
        <button class="social-btn" type="button"><span class="cb-i"><i class="ri-microsoft-fill"></i></span>Microsoft</button>
      </div>
      <div class="divider">or with email</div>
      <div id="login-form"></div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script>
(function(){
  var DS = window.ColaberryDesignSystem_098454 || {};
  var h = React.createElement, useState = React.useState;
  var Input=DS.Input, Button=DS.Button, Checkbox=DS.Checkbox;
  if(!Input){ return; }
  function LoginForm(){
    var f=useState({email:'',pass:''}); var v=f[0],setV=f[1];
    var er=useState({}); var errs=er[0],setErrs=er[1];
    function set(k){ return function(e){ var val=e&&e.target?e.target.value:e; setV(Object.assign({},v,{[k]:val})); }; }
    function submit(e){
      e.preventDefault(); var x={};
      if(!v.email.match(/^[^@\s]+@[^@\s]+\.[^@\s]+$/)) x.email='Enter a valid email';
      if(!v.pass) x.pass='Enter your password';
      setErrs(x);
      if(Object.keys(x).length===0){ window.location.href='dashboard.html'; }
    }
    return h('form',{className:'form-stack',onSubmit:submit,noValidate:true},
      h(Input,{label:'Work email',type:'email',placeholder:'ada@company.com',value:v.email,onChange:set('email'),error:errs.email,required:true}),
      h('div',null,
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline'}},
          h('span',{style:{fontSize:'14px',fontWeight:'500',color:'var(--text-strong)'}},'Password'),
          h('a',{href:'#',style:{fontSize:'13px',color:'var(--text-link)',textDecoration:'none'}},'Forgot?')
        ),
        h('div',{style:{marginTop:'6px'}},
          h(Input,{type:'password',placeholder:'Your password',value:v.pass,onChange:set('pass'),error:errs.pass,required:true})
        )
      ),
      h(Checkbox,{label:'Keep me signed in'}),
      h(Button,{type:'submit',size:'lg',fullWidth:true},'Sign in'),
      h('p',{className:'fine'},'Protected by enterprise-grade security. SOC 2 compliant.')
    );
  }
  ReactDOM.createRoot(document.getElementById('login-form')).render(h(LoginForm));
})();
</script>
</body>
</html>
