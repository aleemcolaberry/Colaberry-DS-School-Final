<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create your account — Colaberry Insight</title>
<link rel="icon" href="../assets/logo/export/favicon-32.png">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="auth">
  <aside class="auth__aside">
    <a href="index.html"><img src="../assets/logo/colaberry-horizontal-white.png" alt="Colaberry"></a>
    <div class="quote">
      <h2>Join the teams turning data into their advantage.</h2>
      <p>Free to start. No credit card. Explore a live analytics workspace with sample data in minutes.</p>
      <div style="display:flex;gap:24px;margin-top:34px">
        <div><div style="font-family:var(--font-display);font-weight:800;font-size:30px">5k+</div><div style="font-size:13px;color:rgba(255,255,255,.7)">Careers launched</div></div>
        <div><div style="font-family:var(--font-display);font-weight:800;font-size:30px">94%</div><div style="font-size:13px;color:rgba(255,255,255,.7)">Goal attainment</div></div>
      </div>
    </div>
    <div style="position:relative;font-size:13px;color:rgba(255,255,255,.7)">Inc. 5000 · Microsoft Partner · SOC 2 compliant</div>
  </aside>

  <main class="auth__main">
    <div class="auth__card cb-anim-fade-up">
      <h1>Create your account</h1>
      <p class="muted">Already have one? <a href="login.html" style="color:var(--text-link);font-weight:500;text-decoration:none">Sign in</a>.</p>
      <div class="social-row" style="margin-bottom:8px">
        <button class="social-btn" type="button"><span class="cb-i"><i class="ri-google-fill"></i></span>Google</button>
        <button class="social-btn" type="button"><span class="cb-i"><i class="ri-microsoft-fill"></i></span>Microsoft</button>
      </div>
      <div class="divider">or with email</div>
      <div id="register-form"></div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script>
(function(){
  var DS = window.ColaberryDesignSystem_098454 || {};
  var h = React.createElement, useState = React.useState;
  var Input=DS.Input, Button=DS.Button, Checkbox=DS.Checkbox;
  if(!Input){ return; }

  function RegisterForm(){
    var f = useState({first:'',last:'',email:'',pass:''}); var v=f[0], setV=f[1];
    var er = useState({}); var errs=er[0], setErrs=er[1];
    var ag = useState(false); var agree=ag[0], setAgree=ag[1];
    function set(k){ return function(e){ var val=e&&e.target?e.target.value:e; setV(Object.assign({},v,{[k]:val})); }; }
    function submit(e){
      e.preventDefault();
      var x={};
      if(!v.first.trim()) x.first='Required';
      if(!v.email.match(/^[^@\s]+@[^@\s]+\.[^@\s]+$/)) x.email='Enter a valid email';
      if(v.pass.length<8) x.pass='At least 8 characters';
      if(!agree) x.agree='Please accept to continue';
      setErrs(x);
      if(Object.keys(x).length===0){ window.location.href='thank-you.html'; }
    }
    return h('form',{className:'form-stack',onSubmit:submit,noValidate:true},
      h('div',{className:'field-row'},
        h(Input,{label:'First name',placeholder:'Ada',value:v.first,onChange:set('first'),error:errs.first,required:true}),
        h(Input,{label:'Last name',placeholder:'Lovelace',value:v.last,onChange:set('last')})
      ),
      h(Input,{label:'Work email',type:'email',placeholder:'ada@company.com',value:v.email,onChange:set('email'),error:errs.email,required:true}),
      h(Input,{label:'Password',type:'password',placeholder:'At least 8 characters',value:v.pass,onChange:set('pass'),error:errs.pass,hint:errs.pass?undefined:'Use 8+ characters with a mix of letters and numbers',required:true}),
      h('div',{style:{marginTop:'4px'}},
        h(Checkbox,{label:'I agree to the Terms of Service and Privacy Policy',checked:agree,onChange:function(e){setAgree(e&&e.target?e.target.checked:e);}}),
        errs.agree?h('div',{style:{color:'var(--status-danger)',fontSize:'13px',marginTop:'6px'}},errs.agree):null
      ),
      h(Button,{type:'submit',size:'lg',fullWidth:true},'Create account'),
      h('p',{className:'fine'},'By continuing you agree to receive product updates. Unsubscribe anytime.')
    );
  }
  ReactDOM.createRoot(document.getElementById('register-form')).render(h(RegisterForm));
})();
</script>
</body>
</html>
