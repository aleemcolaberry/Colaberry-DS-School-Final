<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-page); display:grid; grid-template-columns: repeat(3,1fr); }
  .cell { display:flex; align-items:center; justify-content:center; padding: 28px; }
  .light { background: var(--surface-subtle); }
  .dark { background: var(--neutral-900); }
  .red { background: var(--red-500); }
  img { height: 92px; }
</style>
</head>
<body>
  <div class="cell light"><img src="../../assets/logo/colaberry-mark.png" alt="Colaberry mark color"></div>
  <div class="cell dark"><img src="../../assets/logo/colaberry-mark-white.png?v=2" alt="Colaberry mark white"></div>
  <div class="cell red"><img src="../../assets/logo/colaberry-mark-white.png?v=2" alt="Colaberry mark on cherry"></div>
</body>
</html>
